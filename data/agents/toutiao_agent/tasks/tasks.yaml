# =====================================================================
# ToutiaoAgent 任务定义 —— 一个 yaml 包含所有任务。
#
# 格式说明：
#   tasks:
#     - name: 任务唯一 key（--task <name> 用它）
#       handler: 映射到 src/task/task.py 的 _handler_<handler>() 方法
#       description: 一句话说明
#       inputs:     支持的命令行参数（--<name> <value>）
#         - name: 参数名
#           type: number | string | bool
#           default: 默认值（不传 --name 时用这个）
#           description: 说明
#       workflow_name: （可选）若任务核心是跑某个工作流，写在这里
#       output_dir:    （可选）保存目录
#
# 也支持旧格式：一个 yaml = 一个任务（根级直接写 name/handler/inputs）
# =====================================================================

tasks:

  # ── 1. suggest_topics：只生成话题，不跑 workflow ───
  - name: suggest_topics
    handler: suggest_topics
    description: |
      只生成话题列表，不跑 workflow。用于预览、调试、或批量收集 idea。
      有 --topics 就直接返回它；否则调 LLM 生成 n 个。
    workflow_name: search-toutiao
    inputs:
      - name: n
        type: number
        description: 期望生成的话题数量
        default: 10
      - name: topics
        type: string
        description: （可选）逗号分隔的话题列表；给了就直接返回，不走 LLM
        default: ""

  # ── 2. single_article：给定 query 跑一篇文章 ────
  - name: single_article
    handler: single_article
    description: |
      给定一个 query，跑一次 workflow，产出一篇文章（JSON + Markdown）。
    workflow_name: search-toutiao
    inputs:
      - name: query
        type: string
        description: 文章主题/关键词（传给 workflow 的 query 参数）
        default: ""
      - name: workflow_name
        type: string
        description: （可选）指定使用哪个工作流；默认使用 search-toutiao
        default: search-toutiao

  # ── 3. batch_articles：从 --topics / topic_pool 批量生产 ─
  - name: batch_articles
    handler: batch_articles
    description: |
      从 --topics 或 knowledge/topic_pool.txt 取话题，批量跑 workflow。
      不做 LLM 话题生成 —— 适合已有明确话题列表的场景。
    workflow_name: search-toutiao
    inputs:
      - name: n
        type: number
        description: 生成多少篇文章
        default: 10
      - name: topics
        type: string
        description: 可选，逗号分隔的自定义话题列表
        default: ""
      - name: workflow_name
        type: string
        description: （可选）指定使用哪个工作流；默认使用 search-toutiao
        default: search-toutiao

  # ── 4. daily_batch：LLM 生成话题 + 批量生产 ───────
  - name: daily_batch
    handler: daily_batch
    description: |
      每日例行的批量生成。先由 LLM 生成 n 个不重复话题，再依次跑 workflow。
      有 --topics 就直接用它，不走 LLM 话题生成。
    workflow_name: search-toutiao
    inputs:
      - name: n
        type: number
        description: 期望生成的话题/文章数量
        default: 10
      - name: topics
        type: string
        description: （可选）逗号分隔的话题列表；给了就跳过 LLM 生成步骤
        default: ""
      - name: workflow_name
        type: string
        description: （可选）指定使用哪个工作流；默认使用 search-toutiao
        default: search-toutiao
