name: "search-toutiao"
description: "搜索今日头条新闻并生成图文推广文章"

inputs:
  - name: query
    type: string
    default: "今日头条 最新科技新闻"
    description: "搜索关键词"
  
  - name: count
    type: integer
    default: 10
    description: "搜索结果数量"
  
  - name: llm_provider
    type: string
    default: "deepseek"
    description: "LLM 提供商"
  
  - name: llm_model
    type: string
    default: "deepseek-v4-flash"
    description: "LLM 模型名称"

steps:
  - id: step1_fetch_news
    action: run
    skill: bocha-web-search
    args: ['{"query":"{{inputs.query}}","count":{{inputs.count}}}']
    description: "使用博查搜索获取新闻列表"

  - id: step2_pick_best
    action: chat
    provider: "{{inputs.llm_provider}}"
    model: "{{inputs.llm_model}}"
    system: |
      你是一位资深新媒体编辑。
      请从以下新闻中选出最适合做图文推广的一条新闻。
      要求：
      1. 选择具有话题性和传播力的新闻
      2. 内容积极正面，适合社交媒体传播
      3. 请以 JSON 格式输出，包含以下字段：
         - title: 新闻标题
         - summary: 新闻摘要（100字以内）
         - reason: 选择理由
         - keywords: 关键词数组（3-5个）
    user: |
      以下是搜索返回的新闻列表：
      {{steps.step1_fetch_news.output.stdout}}
    json_mode: true
    description: "选择最适合推广的新闻"

  - id: step3_write_article
    action: chat
    provider: "{{inputs.llm_provider}}"
    model: "{{inputs.llm_model}}"
    system: |
      你是一位专业的微信公众号作者。
      请基于以下新闻素材撰写一篇适合在微信公众号发布的图文推广文章。
      要求：
      1. 标题要吸引人，符合微信公众号风格
      2. 内容结构清晰，分段落展示
      3. 语言生动有趣，适合大众阅读
      4. 结尾可以加入引导互动的内容
      5. 文章长度约500-800字
    user: |
      新闻标题：{{steps.step2_pick_best.output.json.title}}
      新闻摘要：{{steps.step2_pick_best.output.json.summary}}
      选择理由：{{steps.step2_pick_best.output.json.reason}}
      关键词：{{steps.step2_pick_best.output.json.keywords}}
    description: "撰写图文推广文章"

  - id: step4_final_output
    action: log
    text: |
      📰 工作流执行完成！
      
      选中新闻：{{steps.step2_pick_best.output.json.title}}
      关键词：{{steps.step2_pick_best.output.json.keywords}}
      
      📝 文章预览（前200字）：
      {{steps.step3_write_article.output.content[:200]}}...
    description: "输出最终结果"